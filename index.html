<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试</title>
    <style>
        body { margin: 0; background: #1a141c; }
        img { width: 100%; height: auto; display: block; }
        .play-btn {
            position: fixed;
            width: 30px; height: 30px;
            background: rgba(255,235,210,0.9);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .play-btn-1 { top: 30%; left: 5%; }
        .play-btn-2 { top: 50%; left: 5%; }
        .play-btn-3 { top: 70%; left: 5%; }
    </style>
</head>
<body>
    <img src="./image/shotaro.png" alt="背景">
    <button class="play-btn play-btn-1" onclick="alert('1')">▶</button>
    <button class="play-btn play-btn-2" onclick="alert('2')">▶</button>
    <button class="play-btn play-btn-3" onclick="alert('3')">▶</button>
</body>
</html>
