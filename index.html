<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>SHOTARO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 背景图容器（包含背景图 + 播放键） -->
<div class="bg-container">
    <!-- 三个独立播放键，位置相对于背景图固定 -->
    <button class="play-btn play-btn-1" data-track="0" aria-label="播放 sho 1314">
        <span class="play-icon"></span>
    </button>
    <button class="play-btn play-btn-2" data-track="1" aria-label="播放 sho shuita">
        <span class="play-icon"></span>
    </button>
    <button class="play-btn play-btn-3" data-track="2" aria-label="播放 sho shenme">
        <span class="play-icon"></span>
    </button>
</div>

<div class="error-tip" id="audioErrorTip"></div>

<script>
    (function() {
        // 音频文件配置（请确保 voice 文件夹下有这三个文件）
        const rawNames = ['sho 1314', 'sho shuita', 'sho shenme'];
        const audioFiles = rawNames.map(name => `voice/${encodeURIComponent(name)}.mp3`);

        let currentAudio = null;
        let currentPlayingButton = null;
        const errorTip = document.getElementById('audioErrorTip');

        function showError(msg) {
            if (!errorTip) return;
            errorTip.textContent = msg;
            errorTip.style.opacity = '1';
            setTimeout(() => {
                errorTip.style.opacity = '0';
            }, 2500);
        }

        function stopCurrentPlayback(resetStyle = true) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentPlayingButton && resetStyle) {
                currentPlayingButton.classList.remove('playing');
                currentPlayingButton = null;
            } else if (!resetStyle && currentPlayingButton) {
                currentPlayingButton.classList.remove('playing');
                currentPlayingButton = null;
            }
        }

        function playAudioByIndex(index, buttonElement) {
            if (index < 0 || index >= audioFiles.length) {
                showError('音频索引无效');
                return;
            }
            const filePath = audioFiles[index];
            const displayName = rawNames[index];

            if (currentAudio && currentPlayingButton === buttonElement) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio.play().catch(err => {
                    showError(`无法重新播放「${displayName}」`);
                });
                return;
            }

            stopCurrentPlayback(true);

            const audio = new Audio(filePath);
            audio.preload = 'none';   // 提升加载速度，不预加载

            audio.addEventListener('error', () => {
                showError(`🔇 加载失败: ${displayName}.mp3 请检查 voice/ 文件夹`);
                if (buttonElement) buttonElement.classList.remove('playing');
                if (currentAudio === audio) currentAudio = null;
                if (currentPlayingButton === buttonElement) currentPlayingButton = null;
            });

            audio.addEventListener('ended', () => {
                if (currentPlayingButton) currentPlayingButton.classList.remove('playing');
                if (currentAudio === audio) {
                    currentAudio = null;
                    currentPlayingButton = null;
                }
            });

            audio.play().then(() => {
                buttonElement.classList.add('playing');
                currentAudio = audio;
                currentPlayingButton = buttonElement;
            }).catch(err => {
                showError(`▶️ 播放失败「${displayName}」, 请检查文件`);
                buttonElement.classList.remove('playing');
            });
        }

        const btn1 = document.querySelector('.play-btn-1');
        const btn2 = document.querySelector('.play-btn-2');
        const btn3 = document.querySelector('.play-btn-3');

        if (btn1) btn1.addEventListener('click', () => playAudioByIndex(0, btn1));
        if (btn2) btn2.addEventListener('click', () => playAudioByIndex(1, btn2));
        if (btn3) btn3.addEventListener('click', () => playAudioByIndex(2, btn3));

        window.addEventListener('beforeunload', () => {
            if (currentAudio) currentAudio.pause();
        });
    })();
</script>
</body>
</html>
